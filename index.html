<!-- Watson Melo 75428 -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watson Melo 75428</title>
    <style>
        section {
            padding: 20px;
            margin: 20px;
            border: 1px solid #ccc;
            border-radius: 5px;
            transition: background-color 0.3s ease;
        }
        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <section id="big-section">
        <h2>Background Colour: <span id="box-colour">#FFFFFF</span></h2>
        <button id="btn-change-colour">Change Colour</button>
    </section>
    <script>
        const btnChangeColour = document.getElementById("btn-change-colour");
        const boxColour = document.getElementById("box-colour");
        const bigSection = document.getElementById("big-section");

        btnChangeColour.addEventListener("click", () => {
            let strHexColour = '#'; 
            const arrHex = [1,2,3,4,5,6,7,8,9,"A","B","C","D","E","F"];
            for (let i = 0; i < 6; i++) {
                strHexColour += arrHex[getRandomNumber(arrHex.length)];
            }
            boxColour.innerText = strHexColour;
            bigSection.style.backgroundColor = strHexColour;
        });

        function getRandomNumber(max) {
            return Math.floor(Math.random() * max);
        }
    </script>
</body>

</html>
